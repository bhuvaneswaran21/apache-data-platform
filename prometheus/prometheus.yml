global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:

  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: kafka
    static_configs:
      - targets: ["kafka:9101"]   

  - job_name: spark
    metrics_path: /metrics/master/prometheus/
    static_configs:
      - targets: ["spark-master:8090"]

  - job_name: flink
    metrics_path: /
    static_configs:
      - targets: ["flink-jobmanager:9249"]  

  - job_name: trino
    static_configs:
      - targets: ["trino:8085"]

  - job_name: airflow
    metrics_path: /metrics
    static_configs:
      - targets: ["airflow-webserver:8082"]

  - job_name: minio
    metrics_path: /minio/v2/metrics/cluster
    static_configs:
      - targets: ["minio:9000"]

  - job_name: postgres
    static_configs:
      - targets: ["postgres-exporter:9187"]

  - job_name: rabbitmq
    static_configs:
      - targets: ["rabbitmq:15692"] 
